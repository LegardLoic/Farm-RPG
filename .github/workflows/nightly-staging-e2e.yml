name: Nightly Staging E2E

permissions:
  contents: read
  actions: read
  issues: write

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  nightly-staging-e2e:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
      E2E_API_BASE_URL: ${{ secrets.E2E_API_BASE_URL || vars.E2E_API_BASE_URL }}
      E2E_WEB_BASE_URL: ${{ secrets.E2E_WEB_BASE_URL || vars.E2E_WEB_BASE_URL }}
      E2E_WEB_API_BASE_URL: ${{ secrets.E2E_WEB_API_BASE_URL || vars.E2E_WEB_API_BASE_URL || secrets.E2E_API_BASE_URL || vars.E2E_API_BASE_URL }}
      E2E_ACCESS_TOKEN_SECRET: ${{ secrets.E2E_ACCESS_TOKEN_SECRET || vars.E2E_ACCESS_TOKEN_SECRET }}
      E2E_USER_ID: ${{ secrets.E2E_USER_ID || vars.E2E_USER_ID }}
      E2E_WEB_AUTH_ACCESS_TOKEN: ${{ secrets.E2E_WEB_AUTH_ACCESS_TOKEN || vars.E2E_WEB_AUTH_ACCESS_TOKEN }}
      E2E_WEB_AUTH_COOKIE_VALUE: ${{ secrets.E2E_WEB_AUTH_COOKIE_VALUE || vars.E2E_WEB_AUTH_COOKIE_VALUE }}
      E2E_WEB_AUTH_COOKIE_NAME: ${{ secrets.E2E_WEB_AUTH_COOKIE_NAME || vars.E2E_WEB_AUTH_COOKIE_NAME || 'farm_rpg_at' }}
      E2E_SAVE_SLOT: ${{ secrets.E2E_SAVE_SLOT || vars.E2E_SAVE_SLOT || 3 }}
      FIXTURE_SCENARIOS: all
      FIXTURE_RESET_FIRST: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci --include=optional

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate staging configuration
        run: |
          set -euo pipefail

          missing=()
          for key in DATABASE_URL E2E_API_BASE_URL E2E_ACCESS_TOKEN_SECRET E2E_USER_ID; do
            if [ -z "${!key:-}" ]; then
              missing+=("${key}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required staging variables: ${missing[*]}" >&2
            echo "Define them as repository secrets or variables before running this workflow." >&2
            exit 1
          fi

      - name: Seed fixtures
        id: seed_fixtures
        continue-on-error: true
        run: |
          set +e
          mkdir -p artifacts/nightly
          bash apps/api/test/fixtures/run-fixtures.sh 2>&1 | tee artifacts/nightly/seed.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          if [ "${code}" -eq 0 ]; then
            echo "result=passed" >> "$GITHUB_OUTPUT"
          else
            echo "result=failed" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Run API E2E
        id: run_e2e
        if: ${{ steps.seed_fixtures.outputs.exit_code == '0' }}
        continue-on-error: true
        run: |
          set +e
          mkdir -p artifacts/nightly
          npm run test:e2e --workspace @farm-rpg/api 2>&1 | tee artifacts/nightly/e2e.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          if [ "${code}" -eq 0 ]; then
            echo "result=passed" >> "$GITHUB_OUTPUT"
          else
            echo "result=failed" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Install Playwright Chromium
        if: ${{ steps.seed_fixtures.outputs.exit_code == '0' && steps.run_e2e.outputs.exit_code == '0' && env.E2E_WEB_BASE_URL != '' }}
        run: npx playwright install --with-deps chromium

      - name: Run Web Smoke Guest
        id: run_web_smoke_guest
        if: ${{ steps.seed_fixtures.outputs.exit_code == '0' && steps.run_e2e.outputs.exit_code == '0' && env.E2E_WEB_BASE_URL != '' }}
        continue-on-error: true
        env:
          E2E_WEB_BASE_URL: ${{ env.E2E_WEB_BASE_URL }}
          E2E_WEB_API_BASE_URL: ${{ env.E2E_WEB_API_BASE_URL }}
          E2E_WEB_AUTH_ACCESS_TOKEN: ''
          E2E_WEB_AUTH_COOKIE_VALUE: ''
        run: |
          set +e
          mkdir -p artifacts/nightly
          npm run test:smoke --workspace @farm-rpg/web 2>&1 | tee artifacts/nightly/web-smoke-guest.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          if [ "${code}" -eq 0 ]; then
            echo "result=passed" >> "$GITHUB_OUTPUT"
          else
            echo "result=failed" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Build Web Auth Fixture
        id: build_web_auth_fixture
        if: ${{ steps.seed_fixtures.outputs.exit_code == '0' && steps.run_e2e.outputs.exit_code == '0' && env.E2E_WEB_BASE_URL != '' }}
        continue-on-error: true
        run: |
          set +e

          if [ -n "${E2E_WEB_AUTH_ACCESS_TOKEN:-}" ] || [ -n "${E2E_WEB_AUTH_COOKIE_VALUE:-}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "mode=provided" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${E2E_ACCESS_TOKEN_SECRET:-}" ] || [ -z "${E2E_USER_ID:-}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "mode=skipped" >> "$GITHUB_OUTPUT"
            echo "Web auth fixture not available; auth smoke will be skipped." >&2
            exit 0
          fi

          node - <<'NODE' >> "$GITHUB_ENV"
          const { sign } = require('jsonwebtoken');

          const secret = process.env.E2E_ACCESS_TOKEN_SECRET?.trim();
          const userId = process.env.E2E_USER_ID?.trim();
          if (!secret || !userId) {
            process.exit(0);
          }

          const token = sign(
            {
              sub: userId,
              email: process.env.E2E_WEB_AUTH_EMAIL ?? 'nightly.web@farm-rpg.local',
              displayName: process.env.E2E_WEB_AUTH_DISPLAY_NAME ?? 'Nightly Web Smoke',
            },
            secret,
            {
              expiresIn: process.env.E2E_WEB_AUTH_TTL ?? '15m',
            },
          );

          console.log(`E2E_WEB_AUTH_ACCESS_TOKEN=${token}`);
          NODE

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "mode=generated" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run Web Smoke Auth
        id: run_web_smoke_auth
        if: ${{ steps.seed_fixtures.outputs.exit_code == '0' && steps.run_e2e.outputs.exit_code == '0' && steps.build_web_auth_fixture.outputs.ready == 'true' }}
        continue-on-error: true
        env:
          E2E_WEB_BASE_URL: ${{ env.E2E_WEB_BASE_URL }}
          E2E_WEB_API_BASE_URL: ${{ env.E2E_WEB_API_BASE_URL }}
        run: |
          set +e
          mkdir -p artifacts/nightly
          npm run test:smoke --workspace @farm-rpg/web 2>&1 | tee artifacts/nightly/web-smoke-auth.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          if [ "${code}" -eq 0 ]; then
            echo "result=passed" >> "$GITHUB_OUTPUT"
          else
            echo "result=failed" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Build nightly summary
        if: always()
        env:
          SEED_RESULT: ${{ steps.seed_fixtures.outputs.result }}
          SEED_EXIT_CODE: ${{ steps.seed_fixtures.outputs.exit_code }}
          E2E_RESULT: ${{ steps.run_e2e.outputs.result }}
          E2E_EXIT_CODE: ${{ steps.run_e2e.outputs.exit_code }}
          WEB_AUTH_FIXTURE_MODE: ${{ steps.build_web_auth_fixture.outputs.mode }}
          WEB_SMOKE_GUEST_RESULT: ${{ steps.run_web_smoke_guest.outputs.result }}
          WEB_SMOKE_GUEST_EXIT_CODE: ${{ steps.run_web_smoke_guest.outputs.exit_code }}
          WEB_SMOKE_AUTH_RESULT: ${{ steps.run_web_smoke_auth.outputs.result }}
          WEB_SMOKE_AUTH_EXIT_CODE: ${{ steps.run_web_smoke_auth.outputs.exit_code }}
          WEB_SMOKE_TARGET: ${{ env.E2E_WEB_BASE_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/nightly

          if [ -z "${E2E_RESULT:-}" ]; then
            E2E_RESULT="skipped"
          fi
          if [ -z "${E2E_EXIT_CODE:-}" ]; then
            E2E_EXIT_CODE="-"
          fi
          if [ -z "${WEB_AUTH_FIXTURE_MODE:-}" ]; then
            WEB_AUTH_FIXTURE_MODE="skipped"
          fi
          if [ -z "${WEB_SMOKE_GUEST_RESULT:-}" ]; then
            WEB_SMOKE_GUEST_RESULT="skipped"
          fi
          if [ -z "${WEB_SMOKE_GUEST_EXIT_CODE:-}" ]; then
            WEB_SMOKE_GUEST_EXIT_CODE="-"
          fi
          if [ -z "${WEB_SMOKE_AUTH_RESULT:-}" ]; then
            WEB_SMOKE_AUTH_RESULT="skipped"
          fi
          if [ -z "${WEB_SMOKE_AUTH_EXIT_CODE:-}" ]; then
            WEB_SMOKE_AUTH_EXIT_CODE="-"
          fi
          if [ -z "${WEB_SMOKE_TARGET:-}" ]; then
            WEB_SMOKE_TARGET="-"
          fi

          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > artifacts/nightly/summary.json <<EOF
          {
            "timestamp": "${timestamp}",
            "repository": "${REPOSITORY}",
            "ref": "${REF_NAME}",
            "runNumber": "${GITHUB_RUN_NUMBER}",
            "runUrl": "${RUN_URL}",
            "seed": {
              "result": "${SEED_RESULT}",
              "exitCode": "${SEED_EXIT_CODE}"
            },
            "e2e": {
              "result": "${E2E_RESULT}",
              "exitCode": "${E2E_EXIT_CODE}"
            },
            "webAuthFixture": {
              "mode": "${WEB_AUTH_FIXTURE_MODE}"
            },
            "webSmokeGuest": {
              "result": "${WEB_SMOKE_GUEST_RESULT}",
              "exitCode": "${WEB_SMOKE_GUEST_EXIT_CODE}"
            },
            "webSmokeAuth": {
              "target": "${WEB_SMOKE_TARGET}",
              "result": "${WEB_SMOKE_AUTH_RESULT}",
              "exitCode": "${WEB_SMOKE_AUTH_EXIT_CODE}"
            }
          }
          EOF

          {
            echo "## Nightly Staging E2E Summary"
            echo ""
            echo "- Timestamp (UTC): ${timestamp}"
            echo "- Branch: \`${REF_NAME}\`"
            echo "- Seed fixtures: **${SEED_RESULT}** (exit: \`${SEED_EXIT_CODE}\`)"
            echo "- API E2E: **${E2E_RESULT}** (exit: \`${E2E_EXIT_CODE}\`)"
            echo "- Web auth fixture: **${WEB_AUTH_FIXTURE_MODE}**"
            echo "- Web smoke guest: **${WEB_SMOKE_GUEST_RESULT}** (exit: \`${WEB_SMOKE_GUEST_EXIT_CODE}\`)"
            echo "- Web smoke auth: **${WEB_SMOKE_AUTH_RESULT}** (exit: \`${WEB_SMOKE_AUTH_EXIT_CODE}\`, target: \`${WEB_SMOKE_TARGET}\`)"
            echo "- Run URL: ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build nightly history
        id: build_nightly_history
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          CURRENT_RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/nightly

          node - <<'NODE'
          const fs = require('fs/promises');
          const { execFileSync } = require('child_process');
          const path = require('path');

          const repo = process.env.REPOSITORY;
          const token = process.env.GITHUB_TOKEN;
          const currentRunId = String(process.env.CURRENT_RUN_ID);
          const currentRunNumber = String(process.env.CURRENT_RUN_NUMBER);
          const currentRunUrl = process.env.RUN_URL;
          const workflowFile = 'nightly-staging-e2e.yml';
          const apiBase = 'https://api.github.com';
          const headers = {
            Authorization: `Bearer ${token}`,
            Accept: 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28',
          };

          async function ghJson(url) {
            const response = await fetch(url, { headers });
            if (!response.ok) {
              throw new Error(`GitHub API request failed (${response.status}) for ${url}`);
            }
            return response.json();
          }

          function summarize(summary, fallbackRunNumber, fallbackRunUrl) {
            const seed = summary.seed?.result ?? 'skipped';
            const e2e = summary.e2e?.result ?? 'skipped';
            const guest = summary.webSmokeGuest?.result ?? 'skipped';
            const auth = summary.webSmokeAuth?.result ?? 'skipped';
            const overall = [seed, e2e, guest, auth].some((value) => value === 'failed') ? 'failed' : 'passed';
            return {
              timestamp: summary.timestamp ?? '-',
              runNumber: summary.runNumber ?? fallbackRunNumber,
              runUrl: summary.runUrl ?? fallbackRunUrl,
              seed,
              e2e,
              guest,
              auth,
              overall,
            };
          }

          async function readCurrentSummary() {
            const raw = await fs.readFile(path.join('artifacts', 'nightly', 'summary.json'), 'utf8');
            const summary = JSON.parse(raw);
            return summarize(summary, currentRunNumber, currentRunUrl);
          }

          async function downloadPreviousSummary(runId, fallbackRunNumber, fallbackRunUrl) {
            const artifacts = await ghJson(`${apiBase}/repos/${repo}/actions/runs/${runId}/artifacts?per_page=100`);
            const artifact = (artifacts.artifacts ?? []).find((entry) => entry.name.startsWith('nightly-staging-e2e-'));
            if (!artifact) {
              return null;
            }

            const response = await fetch(artifact.archive_download_url, { headers });
            if (!response.ok) {
              throw new Error(`Artifact download failed (${response.status}) for run ${runId}`);
            }

            const zipPath = path.join('artifacts', 'nightly', `history-${runId}.zip`);
            await fs.writeFile(zipPath, Buffer.from(await response.arrayBuffer()));

            try {
              const entries = execFileSync('unzip', ['-Z1', zipPath], { encoding: 'utf8' })
                .split(/\r?\n/)
                .filter(Boolean);
              const summaryEntry = entries.find((entry) => entry.endsWith('summary.json'));
              if (!summaryEntry) {
                return null;
              }

              const summaryText = execFileSync('unzip', ['-p', zipPath, summaryEntry], { encoding: 'utf8' });
              return summarize(JSON.parse(summaryText), fallbackRunNumber, fallbackRunUrl);
            } finally {
              await fs.rm(zipPath, { force: true });
            }
          }

          const history = [];
          history.push(await readCurrentSummary());

          const runs = await ghJson(
            `${apiBase}/repos/${repo}/actions/workflows/${workflowFile}/runs?branch=main&per_page=20`,
          );

          for (const run of runs.workflow_runs ?? []) {
            if (history.length >= 7) {
              break;
            }

            if (String(run.id) === currentRunId) {
              continue;
            }

            const fallbackRunNumber = String(run.run_number ?? run.id);
            const fallbackRunUrl = typeof run.html_url === 'string' ? run.html_url : '';
            const previous = await downloadPreviousSummary(run.id, fallbackRunNumber, fallbackRunUrl);
            if (previous) {
              history.push(previous);
            }
          }

          let consecutiveFailures = 0;
          for (const item of history) {
            if (item.overall === 'failed') {
              consecutiveFailures += 1;
              continue;
            }
            break;
          }

          const markdownLines = [
            '# Nightly Staging History',
            '',
            '| Run | Timestamp (UTC) | Seed | API E2E | Web Guest | Web Auth | Overall |',
            '| --- | --- | --- | --- | --- | --- | --- |',
          ];

          for (const item of history) {
            markdownLines.push(
              `| #${item.runNumber} | ${item.timestamp} | ${item.seed} | ${item.e2e} | ${item.guest} | ${item.auth} | ${item.overall} |`,
            );
          }

          await fs.writeFile(path.join('artifacts', 'nightly', 'history.json'), `${JSON.stringify(history, null, 2)}\n`);
          await fs.writeFile(path.join('artifacts', 'nightly', 'dashboard.md'), `${markdownLines.join('\n')}\n`);

          const outputPath = process.env.GITHUB_OUTPUT;
          if (outputPath) {
            await fs.appendFile(outputPath, `consecutive_failures=${consecutiveFailures}\n`);
          }
          NODE

          {
            echo "## Nightly History"
            echo ""
            echo "Historical dashboard generated for the last 7 nightly runs."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Raise alert on 2 consecutive nightly failures
        if: ${{ always() && steps.build_nightly_history.outputs.consecutive_failures != '' && fromJSON(steps.build_nightly_history.outputs.consecutive_failures) >= 2 }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CONSECUTIVE_FAILURES: ${{ steps.build_nightly_history.outputs.consecutive_failures }}
        run: |
          set -euo pipefail
          node - <<'NODE'
          const repo = process.env.REPOSITORY;
          const token = process.env.GITHUB_TOKEN;
          const runUrl = process.env.RUN_URL;
          const consecutiveFailures = Number.parseInt(process.env.CONSECUTIVE_FAILURES ?? '0', 10);
          const apiBase = 'https://api.github.com';
          const alertTitle = '[Nightly Alert] Staging checks failing repeatedly';

          const headers = {
            Authorization: `Bearer ${token}`,
            Accept: 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28',
          };

          async function ghJson(url, options = {}) {
            const response = await fetch(url, {
              ...options,
              headers: {
                ...headers,
                ...(options.headers ?? {}),
              },
            });
            if (!response.ok) {
              const body = await response.text();
              throw new Error(`GitHub API request failed (${response.status}) for ${url}: ${body}`);
            }
            return response.json();
          }

          async function ghVoid(url, options = {}) {
            const response = await fetch(url, {
              ...options,
              headers: {
                ...headers,
                ...(options.headers ?? {}),
              },
            });
            if (!response.ok) {
              const body = await response.text();
              throw new Error(`GitHub API request failed (${response.status}) for ${url}: ${body}`);
            }
          }

          const alertBody = [
            `Nightly staging checks failed **${consecutiveFailures}** runs in a row.`,
            '',
            `- Latest run: ${runUrl}`,
            '- Check artifacts: `summary.json`, `history.json`, `dashboard.md`, and smoke logs.',
          ].join('\n');

          const issues = await ghJson(`${apiBase}/repos/${repo}/issues?state=open&per_page=100`);
          const existing = (issues ?? []).find(
            (issue) => !issue.pull_request && typeof issue.title === 'string' && issue.title.trim() === alertTitle,
          );

          if (existing) {
            await ghVoid(`${apiBase}/repos/${repo}/issues/${existing.number}/comments`, {
              method: 'POST',
              body: JSON.stringify({ body: alertBody }),
            });
            return;
          }

          await ghVoid(`${apiBase}/repos/${repo}/issues`, {
            method: 'POST',
            body: JSON.stringify({
              title: alertTitle,
              body: alertBody,
            }),
          });
          NODE

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-staging-e2e-${{ github.run_number }}
          path: |
            artifacts/nightly/summary.json
            artifacts/nightly/history.json
            artifacts/nightly/dashboard.md
            artifacts/nightly/seed.log
            artifacts/nightly/e2e.log
            artifacts/nightly/web-smoke-guest.log
            artifacts/nightly/web-smoke-auth.log
          if-no-files-found: warn

      - name: Fail workflow when checks fail
        if: ${{ steps.seed_fixtures.outputs.exit_code != '0' || steps.run_e2e.outputs.exit_code != '0' || steps.run_web_smoke_guest.outputs.result == 'failed' || steps.run_web_smoke_auth.outputs.result == 'failed' }}
        run: |
          echo "Nightly staging checks failed (see summary/artifacts)." >&2
          exit 1
